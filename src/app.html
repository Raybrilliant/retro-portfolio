<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
		/>
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="theme-color" content="#000080" />
		<!-- Fallback title/description for crawlers that don't run JS.
		     The richer tags in <svelte:head> take precedence after hydration. -->
		<title>Raihan Fikri Brilliansyach — Full-Stack Web Developer Portfolio</title>
		<meta
			name="description"
			content="Portfolio of Raihan Fikri Brilliansyach (Rey), a full-stack web developer and government IT professional from Indonesia. Explore Reybrilliant OS, an interactive Windows 98-style portfolio."
		/>
		<meta name="author" content="Raihan Fikri Brilliansyach" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
